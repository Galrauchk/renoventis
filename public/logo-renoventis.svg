    <path d="M15 32V13h7.5c4.2 0 7 2.4 7 6 0 3-1.8 5-4.8 5.8L30 32h-4.2l-4.8-6.5H19V32h-4zM19 16.5v5.5h3.2c2.2 0 3.5-1.2 3.5-2.8 0-1.6-1.3-2.7-3.5-2.7H19z" fill="#1B4332"/>
