<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <rect width="400" height="350" fill="#F0FAF4" rx="12"/>
  <!-- Sun -->
  <circle cx="320" cy="60" r="35" fill="#F4A261" opacity="0.2"/>
  <circle cx="320" cy="60" r="25" fill="#F4A261" opacity="0.4"/>
  <circle cx="320" cy="60" r="15" fill="#F4A261"/>
  <!-- Sun rays -->
  <g stroke="#F4A261" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="320" y1="15" x2="320" y2="25"/>
    <line x1="320" y1="95" x2="320" y2="105"/>
    <line x1="275" y1="60" x2="265" y2="60"/>
    <line x1="375" y1="60" x2="365" y2="60"/>
    <line x1="288" y1="28" x2="281" y2="21"/>
    <line x1="352" y1="92" x2="359" y2="99"/>
    <line x1="288" y1="92" x2="281" y2="99"/>
    <line x1="352" y1="28" x2="359" y2="21"/>
  </g>
  <!-- Roof -->
  <path d="M50 220L200 130L350 220Z" fill="#2D6A4F"/>
  <!-- Solar panels on roof -->
  <g>
    <rect x="100" y="165" width="55" height="35" rx="3" fill="#1B4332" stroke="#52B788" stroke-width="1.5" transform="rotate(-12,127,182)"/>
    <line x1="118" y1="165" x2="118" y2="200" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,127,182)"/>
    <line x1="137" y1="165" x2="137" y2="200" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,127,182)"/>
    <line x1="100" y1="177" x2="155" y2="177" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,127,182)"/>
    <line x1="100" y1="188" x2="155" y2="188" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,127,182)"/>
  </g>
  <g>
    <rect x="165" y="155" width="55" height="35" rx="3" fill="#1B4332" stroke="#52B788" stroke-width="1.5" transform="rotate(-12,192,172)"/>
    <line x1="183" y1="155" x2="183" y2="190" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,192,172)"/>
    <line x1="202" y1="155" x2="202" y2="190" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,192,172)"/>
    <line x1="165" y1="167" x2="220" y2="167" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,192,172)"/>
    <line x1="165" y1="178" x2="220" y2="178" stroke="#52B788" stroke-width="0.7" transform="rotate(-12,192,172)"/>
  </g>
  <g>
    <rect x="230" y="170" width="55" height="35" rx="3" fill="#1B4332" stroke="#52B788" stroke-width="1.5" transform="rotate(12,257,187)"/>
    <line x1="248" y1="170" x2="248" y2="205" stroke="#52B788" stroke-width="0.7" transform="rotate(12,257,187)"/>
    <line x1="267" y1="170" x2="267" y2="205" stroke="#52B788" stroke-width="0.7" transform="rotate(12,257,187)"/>
  </g>
  <!-- House wall -->
  <rect x="70" y="220" width="260" height="90" fill="white" stroke="#1B4332" stroke-width="2"/>
  <!-- kWh counter -->
  <g transform="translate(140,240)">
    <rect x="0" y="0" width="120" height="50" rx="6" fill="#1B4332"/>
    <text x="60" y="20" font-family="Inter,sans-serif" font-size="10" fill="#52B788" text-anchor="middle">Production</text>
    <text x="60" y="40" font-family="Urbanist,sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="700">9 250 kWh</text>
  </g>
  <!-- Energy flow arrow from sun to panels -->
  <path d="M295 85L230 150" stroke="#F4A261" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
</svg>
