<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <linearGradient id="solarPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="sunGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A261" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F4A261" stop-opacity="0"/>
    </linearGradient>
    <filter id="solShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1B4332" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Sun -->
  <circle cx="320" cy="60" r="50" fill="url(#sunGlow)"/>
  <circle cx="320" cy="60" r="30" fill="#F4A261" opacity="0.25"/>
  <circle cx="320" cy="60" r="18" fill="#F4A261" opacity="0.5"/>
  <!-- Sun rays -->
  <g stroke="#F4A261" stroke-width="2" stroke-linecap="round" opacity="0.3">
    <line x1="320" y1="20" x2="320" y2="8"/>
    <line x1="348" y1="32" x2="356" y2="24"/>
    <line x1="360" y1="60" x2="372" y2="60"/>
    <line x1="348" y1="88" x2="356" y2="96"/>
    <line x1="292" y1="32" x2="284" y2="24"/>
  </g>

  <!-- Roof with panels -->
  <g filter="url(#solShadow)" transform="translate(40,100)">
    <!-- Roof surface -->
    <path d="M0 180L160 60L320 180Z" fill="#2D6A4F"/>
    <path d="M0 180L160 60L320 180Z" fill="none" stroke="#1B4332" stroke-width="2.5"/>

    <!-- Solar panel row 1 -->
    <g transform="translate(60, 100) skewY(-18)">
      <rect x="0" y="0" width="55" height="40" rx="3" fill="url(#solarPanel)" stroke="#52B788" stroke-width="1"/>
      <line x1="18" y1="0" x2="18" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="37" y1="0" x2="37" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="13" x2="55" y2="13" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="27" x2="55" y2="27" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <!-- Reflection -->
      <rect x="3" y="3" width="14" height="9" rx="1" fill="white" opacity="0.1"/>
    </g>
    <g transform="translate(120, 100) skewY(-18)">
      <rect x="0" y="0" width="55" height="40" rx="3" fill="url(#solarPanel)" stroke="#52B788" stroke-width="1"/>
      <line x1="18" y1="0" x2="18" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="37" y1="0" x2="37" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="13" x2="55" y2="13" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="27" x2="55" y2="27" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <rect x="3" y="3" width="14" height="9" rx="1" fill="white" opacity="0.1"/>
    </g>

    <!-- Solar panel row 2 -->
    <g transform="translate(80, 70) skewY(-18)">
      <rect x="0" y="0" width="55" height="40" rx="3" fill="url(#solarPanel)" stroke="#52B788" stroke-width="1"/>
      <line x1="18" y1="0" x2="18" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="37" y1="0" x2="37" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="13" x2="55" y2="13" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="27" x2="55" y2="27" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <rect x="3" y="3" width="14" height="9" rx="1" fill="white" opacity="0.1"/>
    </g>
    <g transform="translate(140, 70) skewY(-18)">
      <rect x="0" y="0" width="55" height="40" rx="3" fill="url(#solarPanel)" stroke="#52B788" stroke-width="1"/>
      <line x1="18" y1="0" x2="18" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="37" y1="0" x2="37" y2="40" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="13" x2="55" y2="13" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <line x1="0" y1="27" x2="55" y2="27" stroke="#52B788" stroke-width="0.6" opacity="0.5"/>
      <rect x="3" y="3" width="14" height="9" rx="1" fill="white" opacity="0.1"/>
    </g>
  </g>

  <!-- Energy flow arrow down to house -->
  <g opacity="0.6">
    <path d="M200 295 L200 320" stroke="#F4A261" stroke-width="2" stroke-linecap="round"/>
    <path d="M195 315 L200 325 L205 315" stroke="#F4A261" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Production badge -->
  <g transform="translate(20, 20)" filter="url(#solShadow)">
    <rect x="0" y="0" width="130" height="50" rx="12" fill="white"/>
    <text x="15" y="22" font-family="Urbanist,sans-serif" font-size="10" fill="#5F6B66" font-weight="600">Production</text>
    <text x="15" y="40" font-family="Urbanist,sans-serif" font-size="16" fill="#F4A261" font-weight="800">8 400 kWh/an</text>
  </g>

  <!-- Savings badge -->
  <g transform="translate(20, 280)" filter="url(#solShadow)">
    <rect x="0" y="0" width="120" height="50" rx="12" fill="white"/>
    <text x="15" y="22" font-family="Urbanist,sans-serif" font-size="10" fill="#5F6B66" font-weight="600">Économie</text>
    <text x="15" y="40" font-family="Urbanist,sans-serif" font-size="16" fill="#52B788" font-weight="800">1 680 €/an</text>
  </g>
</svg>
