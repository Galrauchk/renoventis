    <text x="42" y="20" font-family="Inter,sans-serif" font-size="9" fill="#1B4332" text-anchor="middle" font-weight="600">Éco-PTZ</text>
    <text x="42" y="40" font-family="Urbanist,sans-serif" font-size="16" fill="#F4A261" text-anchor="middle" font-weight="700">50 000€</text>
  </g>
  <g transform="translate(296,240)">
