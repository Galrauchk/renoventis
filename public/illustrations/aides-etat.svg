<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <rect width="400" height="350" fill="#F0FAF4" rx="12"/>
  <!-- Shield -->
  <g transform="translate(130,30)">
    <path d="M70 0L140 30V100C140 155 70 190 70 190C70 190 0 155 0 100V30Z" fill="#1B4332"/>
    <path d="M70 10L130 37V100C130 148 70 180 70 180C70 180 10 148 10 100V37Z" fill="#2D6A4F"/>
