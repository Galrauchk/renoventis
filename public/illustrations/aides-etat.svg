    <circle cx="45" cy="42" r="3" fill="#F4A261"/>
    <circle cx="95" cy="42" r="3" fill="#F4A261"/>
    <circle cx="38" cy="65" r="3" fill="#F4A261"/>
    <circle cx="102" cy="65" r="3" fill="#F4A261"/>
  </g>
