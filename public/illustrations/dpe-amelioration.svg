<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <linearGradient id="dpeGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="dpeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1B4332" flood-opacity="0.1"/>
    </filter>
    <filter id="dpeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Before DPE (faded) -->
  <g transform="translate(40, 60)" filter="url(#dpeShadow)" opacity="0.5">
    <rect x="0" y="0" width="130" height="220" rx="14" fill="white"/>
    <text x="65" y="28" font-family="Urbanist,sans-serif" font-size="13" fill="#9CA3AF" text-anchor="middle" font-weight="700">Avant</text>
    <!-- DPE bars -->
    <rect x="15" y="40" width="40" height="14" rx="3" fill="#22C55E" opacity="0.3"/>
    <text x="18" y="51" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">A</text>
    <rect x="15" y="58" width="48" height="14" rx="3" fill="#84CC16" opacity="0.3"/>
    <text x="18" y="69" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">B</text>
    <rect x="15" y="76" width="56" height="14" rx="3" fill="#EAB308" opacity="0.3"/>
    <text x="18" y="87" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">C</text>
    <rect x="15" y="94" width="64" height="14" rx="3" fill="#F59E0B" opacity="0.3"/>
    <text x="18" y="105" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">D</text>
    <rect x="15" y="112" width="72" height="14" rx="3" fill="#F4A261" opacity="0.3"/>
    <text x="18" y="123" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">E</text>
    <rect x="15" y="130" width="80" height="14" rx="3" fill="#EF4444" opacity="0.3"/>
    <text x="18" y="141" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">F</text>
    <!-- G highlighted -->
    <rect x="15" y="148" width="88" height="18" rx="3" fill="#DC2626"/>
    <text x="18" y="161" font-family="Inter,sans-serif" font-size="11" fill="white" font-weight="800">G</text>
    <!-- Arrow indicator -->
    <path d="M108 157 L115 157" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>

    <text x="65" y="190" font-family="Urbanist,sans-serif" font-size="28" fill="#DC2626" text-anchor="middle" font-weight="800">G</text>
    <text x="65" y="210" font-family="Inter,sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">Passoire</text>
  </g>

  <!-- Arrow transition -->
  <g transform="translate(175, 145)">
    <path d="M0 20 L40 20" stroke="#52B788" stroke-width="3" stroke-linecap="round"/>
    <path d="M33 13 L43 20 L33 27" stroke="#52B788" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="20" cy="20" r="18" fill="#52B788" opacity="0.1"/>
  </g>

  <!-- After DPE (highlighted) -->
  <g transform="translate(230, 60)" filter="url(#dpeShadow)">
    <rect x="0" y="0" width="130" height="220" rx="14" fill="white"/>
    <rect x="0" y="0" width="130" height="220" rx="14" fill="none" stroke="#52B788" stroke-width="1.5" opacity="0.3"/>
    <text x="65" y="28" font-family="Urbanist,sans-serif" font-size="13" fill="#1B4332" text-anchor="middle" font-weight="700">Après</text>
    <!-- DPE bars -->
    <rect x="15" y="40" width="40" height="14" rx="3" fill="#22C55E" opacity="0.3"/>
    <text x="18" y="51" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">A</text>
    <!-- B highlighted -->
    <rect x="15" y="58" width="48" height="18" rx="3" fill="url(#dpeGreen)"/>
    <text x="18" y="71" font-family="Inter,sans-serif" font-size="11" fill="white" font-weight="800">B</text>
    <!-- Arrow indicator -->
    <path d="M68 67 L75 67" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>

    <rect x="15" y="80" width="56" height="14" rx="3" fill="#EAB308" opacity="0.2"/>
    <text x="18" y="91" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">C</text>
    <rect x="15" y="98" width="64" height="14" rx="3" fill="#F59E0B" opacity="0.2"/>
    <text x="18" y="109" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">D</text>
    <rect x="15" y="116" width="72" height="14" rx="3" fill="#F4A261" opacity="0.2"/>
    <text x="18" y="127" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">E</text>
    <rect x="15" y="134" width="80" height="14" rx="3" fill="#EF4444" opacity="0.2"/>
    <text x="18" y="145" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">F</text>
    <rect x="15" y="152" width="88" height="14" rx="3" fill="#DC2626" opacity="0.2"/>
    <text x="18" y="163" font-family="Inter,sans-serif" font-size="9" fill="white" font-weight="700">G</text>

    <g filter="url(#dpeGlow)">
      <text x="65" y="195" font-family="Urbanist,sans-serif" font-size="28" fill="#22C55E" text-anchor="middle" font-weight="800">B</text>
    </g>
    <text x="65" y="215" font-family="Inter,sans-serif" font-size="10" fill="#52B788" text-anchor="middle" font-weight="600">Performant</text>
  </g>

  <!-- Bottom stat -->
  <g transform="translate(100, 300)" filter="url(#dpeShadow)">
    <rect x="0" y="0" width="200" height="40" rx="10" fill="#52B788"/>
    <text x="100" y="26" font-family="Urbanist,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Jusqu'à 70% d'aides</text>
  </g>
</svg>
