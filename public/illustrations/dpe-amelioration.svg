<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <rect width="400" height="350" fill="#F0FAF4" rx="12"/>
  <!-- Before DPE -->
  <g transform="translate(30,40)">
    <text x="55" y="0" font-family="Urbanist,sans-serif" font-size="16" fill="#1B4332" text-anchor="middle" font-weight="700">Avant</text>
    <rect x="0" y="15" width="60" height="22" rx="3" fill="#22C55E"/><text x="8" y="31" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">A</text><text x="45" y="31" font-family="Inter,sans-serif" font-size="9" fill="white">≤50</text>
    <rect x="0" y="42" width="70" height="22" rx="3" fill="#84CC16"/><text x="8" y="58" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">B</text>
    <rect x="0" y="69" width="80" height="22" rx="3" fill="#EAB308"/><text x="8" y="85" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">C</text>
    <rect x="0" y="96" width="90" height="22" rx="3" fill="#F59E0B"/><text x="8" y="112" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">D</text>
    <rect x="0" y="123" width="100" height="22" rx="3" fill="#F4A261"/><text x="8" y="139" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">E</text>
    <rect x="0" y="150" width="110" height="22" rx="3" fill="#EF4444"/><text x="8" y="166" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">F</text>
    <rect x="0" y="177" width="120" height="22" rx="3" fill="#DC2626" stroke="#1B4332" stroke-width="2"/><text x="8" y="193" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="700">G</text><text x="35" y="193" font-family="Inter,sans-serif" font-size="9" fill="white">≥450</text>
    <!-- Arrow indicator -->
    <path d="M125 188L135 188L135 183L145 190L135 197L135 192L125 192Z" fill="#DC2626"/>
  </g>
  <!-- Arrow of improvement -->
  <g transform="translate(180,140)">
    <path d="M0 30L40 30L40 20L60 35L40 50L40 40L0 40Z" fill="#52B788"/>
    <text x="30" y="70" font-family="Urbanist,sans-serif" font-size="12" fill="#52B788" text-anchor="middle" font-weight="700">Après travaux</text>
  </g>
  <!-- After DPE -->
  <g transform="translate(260,40)">
    <text x="55" y="0" font-family="Urbanist,sans-serif" font-size="16" fill="#1B4332" text-anchor="middle" font-weight="700">Après</text>
    <rect x="0" y="15" width="60" height="22" rx="3" fill="#22C55E"/><text x="8" y="31" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">A</text>
    <rect x="0" y="42" width="70" height="22" rx="3" fill="#84CC16" stroke="#1B4332" stroke-width="2"/><text x="8" y="58" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="700">B</text><text x="45" y="58" font-family="Inter,sans-serif" font-size="9" fill="white">51-90</text>
    <rect x="0" y="69" width="80" height="22" rx="3" fill="#EAB308"/><text x="8" y="85" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">C</text>
    <rect x="0" y="96" width="90" height="22" rx="3" fill="#F59E0B"/><text x="8" y="112" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">D</text>
    <rect x="0" y="123" width="100" height="22" rx="3" fill="#F4A261"/><text x="8" y="139" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">E</text>
    <rect x="0" y="150" width="110" height="22" rx="3" fill="#EF4444"/><text x="8" y="166" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">F</text>
    <rect x="0" y="177" width="120" height="22" rx="3" fill="#DC2626"/><text x="8" y="193" font-family="Inter,sans-serif" font-size="12" fill="white" font-weight="600">G</text>
    <!-- Arrow indicator at B -->
    <path d="M75 53L85 53L85 48L95 55L85 62L85 57L75 57Z" fill="#84CC16"/>
  </g>
  <!-- Savings badge -->
  <g transform="translate(120,280)">
    <rect x="0" y="0" width="160" height="45" rx="10" fill="#1B4332"/>
    <text x="80" y="20" font-family="Inter,sans-serif" font-size="12" fill="white" text-anchor="middle">Économies jusqu'à</text>
    <text x="80" y="38" font-family="Urbanist,sans-serif" font-size="16" fill="#F4A261" text-anchor="middle" font-weight="700">70% sur vos factures</text>
  </g>
</svg>
