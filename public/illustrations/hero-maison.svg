<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="houseWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F9F4"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <linearGradient id="solarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52B788" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#52B788" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1B4332" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="300" cy="380" rx="200" ry="60" fill="url(#glowGrad)"/>

  <!-- House group with shadow -->
  <g filter="url(#softShadow)">
    <!-- House base -->
    <rect x="160" y="220" width="280" height="180" rx="4" fill="url(#houseWall)"/>
    <!-- Roof -->
    <path d="M140 225L300 120L460 225Z" fill="url(#roofGrad)"/>
    <!-- Roof edge detail -->
    <path d="M140 225L300 120L460 225" stroke="#1B4332" stroke-width="3" fill="none" stroke-linejoin="round"/>

    <!-- Windows - modern style -->
    <g>
      <!-- Left window -->
      <rect x="190" y="260" width="60" height="70" rx="4" fill="#E8F5F0" stroke="#2D6A4F" stroke-width="2"/>
      <line x1="220" y1="260" x2="220" y2="330" stroke="#2D6A4F" stroke-width="1.5"/>
      <line x1="190" y1="295" x2="250" y2="295" stroke="#2D6A4F" stroke-width="1.5"/>
      <!-- Window light reflection -->
      <rect x="193" y="263" width="25" height="30" rx="2" fill="white" opacity="0.4"/>
    </g>
    <g>
      <!-- Right window -->
      <rect x="350" y="260" width="60" height="70" rx="4" fill="#E8F5F0" stroke="#2D6A4F" stroke-width="2"/>
      <line x1="380" y1="260" x2="380" y2="330" stroke="#2D6A4F" stroke-width="1.5"/>
      <line x1="350" y1="295" x2="410" y2="295" stroke="#2D6A4F" stroke-width="1.5"/>
      <rect x="353" y="263" width="25" height="30" rx="2" fill="white" opacity="0.4"/>
    </g>

    <!-- Door -->
    <rect x="275" y="320" width="50" height="80" rx="4" fill="#1B4332"/>
    <rect x="279" y="324" width="42" height="72" rx="3" fill="#2D6A4F"/>
    <circle cx="310" cy="362" r="4" fill="#F4A261"/>
  </g>

  <!-- Solar panels on roof -->
  <g transform="translate(330, 145) rotate(-22)">
    <rect x="0" y="0" width="50" height="35" rx="3" fill="url(#solarGrad)" stroke="#52B788" stroke-width="1"/>
    <line x1="17" y1="0" x2="17" y2="35" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="0" x2="34" y2="35" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="12" x2="50" y2="12" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="24" x2="50" y2="24" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
  </g>
  <g transform="translate(370, 135) rotate(-22)">
    <rect x="0" y="0" width="50" height="35" rx="3" fill="url(#solarGrad)" stroke="#52B788" stroke-width="1"/>
    <line x1="17" y1="0" x2="17" y2="35" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="0" x2="34" y2="35" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="12" x2="50" y2="12" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="24" x2="50" y2="24" stroke="#52B788" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- DPE Badge -->
  <g transform="translate(480, 130)" filter="url(#softShadow)">
    <rect x="0" y="0" width="80" height="110" rx="10" fill="white"/>
    <text x="40" y="20" font-family="Urbanist,sans-serif" font-weight="800" font-size="11" fill="#1B4332" text-anchor="middle">DPE</text>
    <rect x="10" y="28" width="42" height="10" rx="2" fill="#22C55E"/><text x="14" y="36" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="700">A</text>
    <rect x="10" y="40" width="48" height="10" rx="2" fill="#84CC16"/><text x="14" y="48" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="700">B</text>
    <rect x="10" y="52" width="54" height="10" rx="2" fill="#EAB308"/><text x="14" y="60" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="700">C</text>
    <rect x="10" y="64" width="60" height="10" rx="2" fill="#F59E0B" opacity="0.5"/><text x="14" y="72" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="700">D</text>
    <rect x="10" y="76" width="60" height="10" rx="2" fill="#EF4444" opacity="0.3"/><text x="14" y="84" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="700">E</text>
    <rect x="10" y="88" width="60" height="10" rx="2" fill="#DC2626" opacity="0.2"/><text x="14" y="96" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="700">F</text>
    <!-- Arrow showing improvement -->
    <path d="M68 90L68 36" stroke="#52B788" stroke-width="2" stroke-linecap="round"/>
    <path d="M64 40L68 32L72 40" stroke="#52B788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Energy waves / efficiency indicator -->
  <g filter="url(#glow)" opacity="0.6">
    <path d="M120 300 Q100 280 120 260" stroke="#52B788" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M110 310 Q85 280 110 250" stroke="#52B788" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M100 320 Q70 280 100 240" stroke="#52B788" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Sun -->
  <circle cx="90" cy="80" r="35" fill="#F4A261" opacity="0.15"/>
  <circle cx="90" cy="80" r="22" fill="#F4A261" opacity="0.25"/>
  <circle cx="90" cy="80" r="12" fill="#F4A261" opacity="0.4"/>

  <!-- Trees/vegetation -->
  <g opacity="0.6">
    <ellipse cx="520" cy="370" rx="25" ry="40" fill="#52B788"/>
    <ellipse cx="540" cy="380" rx="18" ry="30" fill="#2D6A4F"/>
    <rect x="527" y="380" width="5" height="20" fill="#1B4332" rx="2"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="80" cy="380" rx="20" ry="35" fill="#52B788"/>
    <rect x="78" y="385" width="4" height="15" fill="#1B4332" rx="2"/>
  </g>
</svg>
