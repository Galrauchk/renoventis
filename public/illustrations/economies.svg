<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <linearGradient id="ecoBar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#95D5B2"/>
    </linearGradient>
    <linearGradient id="ecoBar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#52B788"/>
    </linearGradient>
    <linearGradient id="savingsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E76F51"/>
    </linearGradient>
    <filter id="ecoShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1B4332" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Chart area -->
  <g transform="translate(50, 30)" filter="url(#ecoShadow)">
    <rect x="0" y="0" width="300" height="220" rx="16" fill="white"/>

    <!-- Title -->
    <text x="20" y="30" font-family="Urbanist,sans-serif" font-size="13" fill="#1B4332" font-weight="700">Facture énergétique annuelle</text>

    <!-- Y axis labels -->
    <text x="20" y="60" font-family="Inter,sans-serif" font-size="9" fill="#9CA3AF">3 000€</text>
    <text x="20" y="100" font-family="Inter,sans-serif" font-size="9" fill="#9CA3AF">2 000€</text>
    <text x="20" y="140" font-family="Inter,sans-serif" font-size="9" fill="#9CA3AF">1 000€</text>
    <text x="20" y="180" font-family="Inter,sans-serif" font-size="9" fill="#9CA3AF">0€</text>

    <!-- Grid lines -->
    <line x1="60" y1="55" x2="280" y2="55" stroke="#F3F4F6" stroke-width="1"/>
    <line x1="60" y1="95" x2="280" y2="95" stroke="#F3F4F6" stroke-width="1"/>
    <line x1="60" y1="135" x2="280" y2="135" stroke="#F3F4F6" stroke-width="1"/>
    <line x1="60" y1="175" x2="280" y2="175" stroke="#F3F4F6" stroke-width="1"/>

    <!-- Before bar -->
    <rect x="90" y="65" width="50" height="110" rx="6" fill="#E5E7EB"/>
    <text x="115" y="195" font-family="Inter,sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle" font-weight="600">Avant</text>
    <text x="115" y="58" font-family="Urbanist,sans-serif" font-size="11" fill="#6B7280" text-anchor="middle" font-weight="700">2 800€</text>

    <!-- After bar -->
    <rect x="190" y="135" width="50" height="40" rx="6" fill="url(#ecoBar1)"/>
    <text x="215" y="195" font-family="Inter,sans-serif" font-size="10" fill="#1B4332" text-anchor="middle" font-weight="600">Après</text>
    <text x="215" y="128" font-family="Urbanist,sans-serif" font-size="11" fill="#52B788" text-anchor="middle" font-weight="700">840€</text>

    <!-- Savings arrow -->
    <path d="M155 100 L178 100" stroke="#F4A261" stroke-width="2" stroke-linecap="round"/>
    <path d="M173 95 L180 100 L173 105" stroke="#F4A261" stroke-width="2" stroke-linecap="round" fill="none"/>
    <text x="168" y="92" font-family="Urbanist,sans-serif" font-size="10" fill="#F4A261" text-anchor="middle" font-weight="700">-70%</text>
  </g>

  <!-- Savings card -->
  <g transform="translate(80, 270)" filter="url(#ecoShadow)">
    <rect x="0" y="0" width="240" height="60" rx="14" fill="white"/>
    <rect x="0" y="0" width="240" height="60" rx="14" fill="none" stroke="#52B788" stroke-width="1.5" opacity="0.3"/>
    <!-- Euro icon -->
    <circle cx="35" cy="30" r="18" fill="#52B788" opacity="0.1"/>
    <text x="35" y="37" font-family="Urbanist,sans-serif" font-size="20" fill="#52B788" text-anchor="middle" font-weight="800">€</text>
    <!-- Text -->
    <text x="65" y="24" font-family="Inter,sans-serif" font-size="10" fill="#5F6B66" font-weight="600">Économie estimée</text>
    <text x="65" y="44" font-family="Urbanist,sans-serif" font-size="18" fill="#1B4332" font-weight="800">1 960 €/an</text>
  </g>
</svg>
