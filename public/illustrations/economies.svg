<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <rect width="400" height="350" fill="#F0FAF4" rx="12"/>
  <!-- Title -->
  <text x="200" y="35" font-family="Urbanist,sans-serif" font-size="16" fill="#1B4332" text-anchor="middle" font-weight="700">Économies sur vos factures</text>
  <!-- Chart area -->
  <g transform="translate(60,60)">
    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="220" stroke="#1B4332" stroke-width="1.5"/>
    <!-- X axis -->
    <line x1="0" y1="220" x2="300" y2="220" stroke="#1B4332" stroke-width="1.5"/>
    <!-- Y labels -->
    <text x="-10" y="5" font-family="Inter,sans-serif" font-size="10" fill="#6B7280" text-anchor="end">3000€</text>
    <text x="-10" y="78" font-family="Inter,sans-serif" font-size="10" fill="#6B7280" text-anchor="end">2000€</text>
    <text x="-10" y="151" font-family="Inter,sans-serif" font-size="10" fill="#6B7280" text-anchor="end">1000€</text>
    <text x="-10" y="224" font-family="Inter,sans-serif" font-size="10" fill="#6B7280" text-anchor="end">0€</text>
    <!-- Grid lines -->
    <line x1="0" y1="73" x2="300" y2="73" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="0" y1="146" x2="300" y2="146" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- Before bars (red-ish) -->
    <rect x="20" y="15" width="30" height="205" rx="4" fill="#EF4444" opacity="0.7"/>
    <rect x="80" y="15" width="30" height="205" rx="4" fill="#EF4444" opacity="0.7"/>
    <!-- After bars (green) - decreasing -->
    <rect x="140" y="80" width="30" height="140" rx="4" fill="#52B788"/>
    <rect x="200" y="120" width="30" height="100" rx="4" fill="#52B788"/>
    <rect x="260" y="155" width="30" height="65" rx="4" fill="#52B788"/>
    <!-- X labels -->
    <text x="35" y="240" font-family="Inter,sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">2024</text>
    <text x="95" y="240" font-family="Inter,sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">2025</text>
    <text x="155" y="240" font-family="Inter,sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Isolation</text>
    <text x="215" y="240" font-family="Inter,sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">+PAC</text>
    <text x="275" y="240" font-family="Inter,sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">+Solaire</text>
    <!-- Savings arrow -->
    <path d="M95 10L275 10" stroke="#F4A261" stroke-width="1.5" stroke-dasharray="4,2"/>
    <path d="M275 150L275 10" stroke="#F4A261" stroke-width="2"/>
    <path d="M270 20L275 10L280 20" fill="#F4A261"/>
  </g>
  <!-- Savings badge -->
  <g transform="translate(260,90)">
    <rect x="0" y="0" width="100" height="35" rx="8" fill="#F4A261"/>
    <text x="50" y="15" font-family="Inter,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">Économie</text>
    <text x="50" y="30" font-family="Urbanist,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">-70%</text>
  </g>
</svg>
