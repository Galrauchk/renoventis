<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <linearGradient id="rgeShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <filter id="rgeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1B4332" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Central shield/badge -->
  <g filter="url(#rgeShadow)" transform="translate(120, 40)">
    <!-- Shield shape -->
    <path d="M80 10 L150 40 L150 120 Q150 180 80 210 Q10 180 10 120 L10 40 Z" fill="url(#rgeShield)"/>
    <path d="M80 10 L150 40 L150 120 Q150 180 80 210 Q10 180 10 120 L10 40 Z" fill="none" stroke="#95D5B2" stroke-width="2"/>
    <!-- Inner shield -->
    <path d="M80 25 L140 50 L140 115 Q140 168 80 195 Q20 168 20 115 L20 50 Z" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Checkmark -->
    <path d="M55 105 L72 122 L108 82" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- RGE text -->
    <text x="80" y="158" font-family="Urbanist,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="800">RGE</text>
    <!-- Stars -->
    <g fill="#F4A261">
      <path d="M50 170l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/>
      <path d="M80 165l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/>
      <path d="M110 170l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/>
    </g>
  </g>

  <!-- Worker figure (simplified, professional) -->
  <g transform="translate(30, 140)" opacity="0.7">
    <!-- Hard hat -->
    <ellipse cx="45" cy="120" rx="18" ry="8" fill="#F4A261"/>
    <path d="M28 120 Q28 105 45 105 Q62 105 62 120" fill="#F4A261"/>
    <!-- Head -->
    <circle cx="45" cy="130" r="12" fill="#D4A574"/>
    <!-- Body -->
    <rect x="33" y="142" width="24" height="35" rx="4" fill="#2D6A4F"/>
    <!-- Tool -->
    <rect x="58" y="150" width="3" height="25" rx="1" fill="#9CA3AF"/>
    <rect x="54" y="147" width="11" height="6" rx="2" fill="#6B7280"/>
  </g>

  <!-- Worker figure 2 -->
  <g transform="translate(310, 140)" opacity="0.7">
    <ellipse cx="45" cy="120" rx="18" ry="8" fill="#F4A261"/>
    <path d="M28 120 Q28 105 45 105 Q62 105 62 120" fill="#F4A261"/>
    <circle cx="45" cy="130" r="12" fill="#D4A574"/>
    <rect x="33" y="142" width="24" height="35" rx="4" fill="#1B4332"/>
    <!-- Clipboard -->
    <rect x="20" y="155" width="14" height="18" rx="2" fill="white" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="23" y1="161" x2="31" y2="161" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="23" y1="165" x2="31" y2="165" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="23" y1="169" x2="29" y2="169" stroke="#D1D5DB" stroke-width="1"/>
  </g>

  <!-- Bottom badges -->
  <g transform="translate(50, 280)" filter="url(#rgeShadow)">
    <rect x="0" y="0" width="130" height="45" rx="10" fill="white"/>
    <circle cx="25" cy="22" r="12" fill="#52B788" opacity="0.15"/>
    <path d="M20 22l4 4 8-8" stroke="#52B788" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="45" y="18" font-family="Inter,sans-serif" font-size="9" fill="#5F6B66" font-weight="600">Certifié</text>
    <text x="45" y="32" font-family="Urbanist,sans-serif" font-size="12" fill="#1B4332" font-weight="700">Qualibat</text>
  </g>

  <g transform="translate(220, 280)" filter="url(#rgeShadow)">
    <rect x="0" y="0" width="130" height="45" rx="10" fill="white"/>
    <circle cx="25" cy="22" r="12" fill="#F4A261" opacity="0.15"/>
    <path d="M20 22l4 4 8-8" stroke="#F4A261" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="45" y="18" font-family="Inter,sans-serif" font-size="9" fill="#5F6B66" font-weight="600">Garantie</text>
    <text x="45" y="32" font-family="Urbanist,sans-serif" font-size="12" fill="#1B4332" font-weight="700">Décennale</text>
  </g>
</svg>
