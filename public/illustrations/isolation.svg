<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <linearGradient id="isoWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F9F4"/>
    </linearGradient>
    <linearGradient id="isoLayer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#95D5B2"/>
    </linearGradient>
    <filter id="isoShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1B4332" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- House cross-section -->
  <g filter="url(#isoShadow)" transform="translate(50,20)">
    <!-- Roof -->
    <path d="M150 30L20 120L280 120Z" fill="#2D6A4F"/>
    <path d="M150 30L20 120L280 120Z" fill="none" stroke="#1B4332" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Attic insulation highlight -->
    <path d="M150 50L40 120L260 120Z" fill="#F4A261" opacity="0.2"/>
    <path d="M150 50L40 120L260 120Z" fill="none" stroke="#F4A261" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Walls -->
    <rect x="30" y="120" width="240" height="180" fill="url(#isoWall)" stroke="#1B4332" stroke-width="2"/>

    <!-- Wall insulation layers - left -->
    <rect x="30" y="120" width="25" height="180" fill="url(#isoLayer)" opacity="0.35" rx="1"/>
    <!-- Insulation pattern left -->
    <g opacity="0.5">
      <path d="M35 130c5 5 5 10 0 15s-5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15" stroke="#52B788" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M48 130c5 5 5 10 0 15s-5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15" stroke="#52B788" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Wall insulation layers - right -->
    <rect x="245" y="120" width="25" height="180" fill="url(#isoLayer)" opacity="0.35" rx="1"/>
    <g opacity="0.5">
      <path d="M250 130c5 5 5 10 0 15s-5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15" stroke="#52B788" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M263 130c5 5 5 10 0 15s-5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15 5 10 0 15 -5 10 0 15" stroke="#52B788" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Floor insulation -->
    <rect x="20" y="300" width="260" height="18" fill="#F4A261" opacity="0.2" rx="2"/>
    <path d="M25 309H275" stroke="#F4A261" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>

    <!-- Windows -->
    <rect x="80" y="160" width="50" height="60" rx="4" fill="#D4EDDA" stroke="#2D6A4F" stroke-width="2"/>
    <line x1="105" y1="160" x2="105" y2="220" stroke="#2D6A4F" stroke-width="1.5"/>
    <line x1="80" y1="190" x2="130" y2="190" stroke="#2D6A4F" stroke-width="1.5"/>
    <rect x="83" y="163" width="20" height="25" rx="2" fill="white" opacity="0.4"/>

    <rect x="170" y="160" width="50" height="60" rx="4" fill="#D4EDDA" stroke="#2D6A4F" stroke-width="2"/>
    <line x1="195" y1="160" x2="195" y2="220" stroke="#2D6A4F" stroke-width="1.5"/>
    <line x1="170" y1="190" x2="220" y2="190" stroke="#2D6A4F" stroke-width="1.5"/>
    <rect x="173" y="163" width="20" height="25" rx="2" fill="white" opacity="0.4"/>

    <!-- Door -->
    <rect x="125" y="245" width="45" height="55" rx="3" fill="#1B4332"/>
    <circle cx="160" cy="275" r="3" fill="#F4A261"/>
  </g>

  <!-- Labels -->
  <g font-family="Urbanist,sans-serif" font-weight="700" font-size="11">
    <text x="330" y="95" fill="#F4A261">Combles</text>
    <line x1="250" y1="85" x2="325" y2="90" stroke="#F4A261" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="330" y="200" fill="#52B788">Murs ITE</text>
    <line x1="325" y1="197" x2="328" y2="197" stroke="#52B788" stroke-width="1"/>
    <text x="330" y="325" fill="#F4A261">Plancher</text>
    <line x1="280" y1="318" x2="325" y2="322" stroke="#F4A261" stroke-width="1" stroke-dasharray="3 2"/>
  </g>
</svg>
