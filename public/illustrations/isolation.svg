<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <rect width="400" height="350" fill="#F0FAF4" rx="12"/>
  <!-- House cross-section -->
  <g transform="translate(60,30)">
    <!-- Roof outline -->
    <path d="M140 20L20 100L260 100Z" fill="#1B4332" stroke="#1B4332" stroke-width="2"/>
    <!-- Attic insulation (combles) -->
    <path d="M140 35L35 100L245 100Z" fill="#F4A261" opacity="0.4"/>
    <text x="105" y="80" font-family="Inter,sans-serif" font-size="10" fill="#1B4332" text-anchor="middle" font-weight="600">Combles</text>
    <!-- Walls -->
    <rect x="30" y="100" width="220" height="170" fill="white" stroke="#1B4332" stroke-width="2"/>
    <!-- Wall insulation left -->
    <rect x="30" y="100" width="20" height="170" fill="#52B788" opacity="0.4"/>
    <!-- Wall insulation right -->
    <rect x="230" y="100" width="20" height="170" fill="#52B788" opacity="0.4"/>
    <text x="15" y="190" font-family="Inter,sans-serif" font-size="9" fill="#1B4332" transform="rotate(-90,15,190)" font-weight="600">Murs</text>
    <!-- Floor insulation -->
    <rect x="20" y="270" width="240" height="15" fill="#F4A261" opacity="0.4"/>
    <text x="140" y="300" font-family="Inter,sans-serif" font-size="10" fill="#1B4332" text-anchor="middle" font-weight="600">Sol</text>
    <!-- Windows -->
    <rect x="70" y="140" width="40" height="50" rx="3" fill="#B7E4C7" stroke="#1B4332" stroke-width="1.5"/>
    <line x1="90" y1="140" x2="90" y2="190" stroke="#1B4332" stroke-width="1"/>
    <rect x="170" y="140" width="40" height="50" rx="3" fill="#B7E4C7" stroke="#1B4332" stroke-width="1.5"/>
    <line x1="190" y1="140" x2="190" y2="190" stroke="#1B4332" stroke-width="1"/>
    <!-- Door -->
    <rect x="120" y="210" width="40" height="60" rx="3" fill="#1B4332"/>
    <!-- Insulation zigzag patterns -->
    <path d="M32 120L38 130L32 140L38 150L32 160L38 170L32 180L38 190L32 200L38 210L32 220L38 230L32 240L38 250L32 260" stroke="#52B788" stroke-width="1.5" fill="none"/>
    <path d="M232 120L238 130L232 140L238 150L232 160L238 170L232 180L238 190L232 200L238 210L232 220L238 230L232 240L238 250L232 260" stroke="#52B788" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Legend -->
  <g transform="translate(300,140)">
    <rect x="0" y="0" width="12" height="12" fill="#F4A261" opacity="0.6" rx="2"/>
    <text x="16" y="10" font-family="Inter,sans-serif" font-size="9" fill="#1B4332">Isolation</text>
    <rect x="0" y="20" width="12" height="12" fill="#52B788" opacity="0.6" rx="2"/>
    <text x="16" y="30" font-family="Inter,sans-serif" font-size="9" fill="#1B4332">ITE</text>
  </g>
</svg>
